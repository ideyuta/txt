<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>txt。 — iCloud メモ</title>
<meta name="description" content="iCloud に保存できる、紙のように静かなメモ帳。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23c73e2b'/%3E%3Ctext x='16' y='22' font-size='16' text-anchor='middle' fill='%23f6f1e7' font-family='serif' font-weight='bold'%3E文%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app" id="app">

  <!-- ───────── サイドバー ───────── -->
  <aside class="sidebar" id="sidebar">
    <header class="brand">
      <h1 class="brand-name">txt<span class="brand-dot">。</span></h1>
      <p class="brand-sub">iCloud に綴じるメモ帳</p>
    </header>

    <div class="sidebar-tools">
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 16 16" aria-hidden="true"><circle cx="7" cy="7" r="4.6" fill="none" stroke="currentColor" stroke-width="1.4"/><line x1="10.4" y1="10.4" x2="14" y2="14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
        <input type="search" id="search" class="search" placeholder="メモを探す…" autocomplete="off">
      </div>
      <button class="btn-new" id="btn-new" title="新しいメモ (⌘N)">
        <span class="btn-new-plus">＋</span> 新しいメモ
      </button>
    </div>

    <nav class="note-list" id="note-list" aria-label="メモ一覧"></nav>

    <footer class="sidebar-foot">
      <button class="sync-chip" id="sync-chip" title="同期設定を開く">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">ローカル保存</span>
      </button>
      <button class="icon-btn" id="btn-settings" title="設定" aria-label="設定">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 5.2A2.8 2.8 0 1 0 8 10.8 2.8 2.8 0 0 0 8 5.2Zm6-.4-1.4-.5a4.9 4.9 0 0 0-.5-1.2l.6-1.3-1.5-1.5-1.3.6c-.4-.2-.8-.4-1.2-.5L8.2 0H6.8l-.5 1.4c-.4.1-.8.3-1.2.5l-1.3-.6-1.5 1.5.6 1.3c-.2.4-.4.8-.5 1.2L1 5.8v1.4l1.4.5c.1.4.3.8.5 1.2l-.6 1.3 1.5 1.5 1.3-.6c.4.2.8.4 1.2.5l.5 1.4h1.4l.5-1.4c.4-.1.8-.3 1.2-.5l1.3.6 1.5-1.5-.6-1.3c.2-.4.4-.8.5-1.2l1.4-.5V5.8Z" transform="translate(0 1)" fill="currentColor"/></svg>
      </button>
    </footer>
  </aside>

  <!-- ───────── 編集ペイン ───────── -->
  <main class="editor-pane" id="editor-pane">
    <div class="editor-head">
      <button class="icon-btn only-mobile" id="btn-back" aria-label="一覧へ戻る">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M10.5 2.5 5 8l5.5 5.5" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <span class="save-state" id="save-state"></span>
      <span class="spacer"></span>
      <button class="icon-btn danger" id="btn-delete" title="このメモを削除" aria-label="削除">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M2.5 4h11M6.5 4V2.8c0-.4.3-.8.8-.8h1.4c.5 0 .8.4.8.8V4m2.7 0-.6 9.2c0 .4-.4.8-.8.8H4.7c-.4 0-.8-.4-.8-.8L3.3 4" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
      </button>
    </div>

    <div class="editor-body" id="editor-body" hidden>
      <input type="text" id="note-title" class="note-title" placeholder="無題" autocomplete="off">
      <div class="rule"><span class="rule-stamp">記</span></div>
      <textarea id="note-body" class="note-body" placeholder="ここに書きはじめる…" spellcheck="false"></textarea>
      <div class="editor-meta" id="editor-meta"></div>
    </div>

    <div class="empty-state" id="empty-state">
      <div class="empty-stamp">空</div>
      <p class="empty-line">まだ何も書かれていません。</p>
      <p class="empty-hint">「＋ 新しいメモ」から、一枚目を。</p>
    </div>
  </main>
</div>

<!-- ───────── 設定モーダル ───────── -->
<dialog class="settings" id="settings-dialog">
  <form method="dialog" class="settings-inner">
    <header class="settings-head">
      <h2>iCloud 同期の設定</h2>
      <button class="icon-btn" value="cancel" formnovalidate aria-label="閉じる">
        <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M3.5 3.5 12.5 12.5M12.5 3.5 3.5 12.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </header>

    <p class="settings-note">
      iCloud 同期には Apple Developer の CloudKit コンテナと API トークンが必要です。
      手順は <a href="https://github.com/ideyuta/txt#icloud-同期のセットアップ" target="_blank" rel="noopener">README</a> を参照してください。
      未設定のままでも、メモはこのブラウザ（ローカル）に保存されます。
    </p>

    <label class="field">
      <span>コンテナ ID</span>
      <input type="text" id="cfg-container" placeholder="iCloud.com.example.txt" autocomplete="off">
    </label>
    <label class="field">
      <span>API トークン</span>
      <input type="text" id="cfg-token" placeholder="64文字のトークン" autocomplete="off">
    </label>
    <label class="field">
      <span>環境</span>
      <select id="cfg-env">
        <option value="development">development（開発・お試し）</option>
        <option value="production">production（本番）</option>
      </select>
    </label>

    <div class="settings-actions">
      <button type="button" class="btn-secondary" id="cfg-clear">設定を消去</button>
      <button type="button" class="btn-primary" id="cfg-save">保存して接続</button>
    </div>

    <div class="auth-area" id="auth-area" hidden>
      <div class="rule-thin"></div>
      <div class="auth-row">
        <div id="apple-sign-in-button"></div>
        <div id="apple-sign-out-button"></div>
        <span class="auth-user" id="auth-user"></span>
      </div>
      <button type="button" class="btn-secondary" id="btn-migrate" hidden>このブラウザのメモを iCloud へコピー</button>
    </div>
  </form>
</dialog>

<div class="toast" id="toast" role="status"></div>

<script src="app.js"></script>
</body>
</html>
